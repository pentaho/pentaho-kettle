name: Merge workflow

on:
  push:
    branches: [ "master" ]

  workflow_dispatch:

jobs:
  resolve-version:
    runs-on: [ k8s ]
    container:
      image: ${{ vars.PDIA_AC_CONTAINER_IMAGE }}
      credentials:
        username: ${{ secrets.PENTAHO_CICD_ONE_USER }}
        password: ${{ secrets.PENTAHO_CICD_ONE_KEY }}
      volumes:
        - /home/runner/caches/pentaho/.m2:/root/.m2
    outputs:
      base_version: ${{ steps.build-version.outputs.base_version }}
      artifacts: ${{ steps.get-artifacts.outputs.artifacts }}
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Retrieve settings file
        id: common-maven
        uses: pentaho/actions-common@stable

      - name: Copy settings.xml to .m2 directory
        shell: sh
        run: cp "${{ steps.common-maven.outputs.settings-file-path }}" /root/.m2

      - name: Get current version from pom.xml
        id: get-version
        run: |
          current_version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Current version: $current_version"
          echo "current_version=$current_version" >> $GITHUB_OUTPUT

      - name: Build date-based version
        id: build-version
        shell: bash
        run: |
          current_version=${{ steps.get-version.outputs.current_version }}

          # Remove the -SNAPSHOT suffix if present
          base_version=${current_version%-SNAPSHOT}

          # Replace the last version segment with current date (YYYYMMDD)
          # e.g. 11.1.0.0-SNAPSHOT → 11.1.0.20260421-SNAPSHOT
          date_segment=$(date -u +%Y%m%d)
          new_version=$(echo "$base_version" | sed "s/\.[^.]*$/.${date_segment}/")

          # Reattach the -SNAPSHOT suffix if it was present
          if [[ "$current_version" == *-SNAPSHOT ]]; then
            new_version="$new_version-SNAPSHOT"
          fi

          echo "Base version: $base_version"
          echo "New version:  $new_version"
          echo "base_version=$new_version" >> $GITHUB_OUTPUT

      - name: Apply virtual version to pom.xml files
        # Version is set in-memory for this build only.
        # Changes are NOT committed back to the repository — pom.xml files remain unchanged in main.
        run: mvn versions:set -DnewVersion=${{ steps.build-version.outputs.base_version }} -DprocessAllModules=true -DgenerateBackupPoms=false

      - name: Collect built artifact names
        id: get-artifacts
        shell: bash
        run: |
          set -euo pipefail

          # Collect full groupId:artifactId:version per module from the reactor.
          # Each module may declare its own groupId (e.g. pentaho-kettle vs org.pentaho.di.plugins),
          # so we cannot reuse the root groupId — exec:exec is called with all three expressions.
          # stderr is intentionally NOT suppressed so Maven failures surface immediately.
          artifacts=$(mvn -q \
            -Dexec.executable='echo' \
            -Dexec.args='${project.groupId}:${project.artifactId}:${project.version}' \
            exec:exec | grep -v '^$' | paste -sd ',')

          echo "Collected artifacts: $artifacts"
          echo "artifacts=$artifacts" >> $GITHUB_OUTPUT

  reusable-merge-workflow:
    needs: resolve-version
    uses: pentaho/actions-common/.github/workflows/merge.yml@stable
    with:
      modules_to_build: "."
      base_version: ${{ needs.resolve-version.outputs.base_version }}
      # Apply the virtual date-based version at build time so the reusable workflow's
      # fresh checkout also uses the correct version without committing pom.xml changes.
      additional_mvn_directives: >-
        versions:set
        -DnewVersion=${{ needs.resolve-version.outputs.base_version }}
        -DprocessAllModules=true
        -DgenerateBackupPoms=false
      run_release_candidate: 'true'
    secrets: inherit

  trigger-downstream:
    name: Trigger downstream pentaho-platform workflow
    # Set repository variable TRIGGER_DOWNSTREAM_ENABLED=true to enable this job.
    # Leave it unset or set to any other value to skip (safe default while the
    # target workflow does not yet exist in pentaho/pentaho-platform).
    if: vars.TRIGGER_DOWNSTREAM_ENABLED == 'true'
    runs-on: [ k8s ]
    needs: [ resolve-version, reusable-merge-workflow ]
    steps:
      - name: Dispatch workflow in pentaho/pentaho-platform
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PENTAHO_BUILDGUY }}
          script: |
            const version   = '${{ needs.resolve-version.outputs.base_version }}';
            const artifacts = '${{ needs.resolve-version.outputs.artifacts }}';

            console.log(`Triggering pentaho-platform workflow`);
            console.log(`  version:   ${version}`);
            console.log(`  artifacts: ${artifacts}`);

            await github.rest.actions.createWorkflowDispatch({
              owner: 'pentaho',
              repo: 'pentaho-platform',
              workflow_id: 'merge.yml',
              ref: 'main',
              inputs: {
                version:   version,
                artifacts: artifacts
              }
            });
