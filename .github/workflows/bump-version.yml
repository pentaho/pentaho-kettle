name: Bump version

on:
  push:
    branches: [ main ]
    paths-ignore:
      - .github/**

  workflow_dispatch:

env:
  # NOTE: GitHub Actions does not expand env vars referencing other env vars in the env block,
  # so the full URL is constructed explicitly here.
  RESOLVE_REPO_MIRROR: https://${{ vars.ARTIFACTORY_HOST }}/artifactory/pnt-mvn

  NEXUS_DEPLOY_USER: ${{ secrets.PENTAHO_CICD_ONE_USER }}
  NEXUS_DEPLOY_PASSWORD: ${{ secrets.PENTAHO_CICD_ONE_KEY }}

jobs:
  bump-version:
    # Skip if the push was made by the version-bump bot itself (avoid infinite loop)
    if: github.event.head_commit.author.name != 'buildguy'
    runs-on: [ k8s ]
    container:
      image: ${{ vars.PDIA_AC_CONTAINER_IMAGE }}
      credentials:
        username: ${{ secrets.PENTAHO_CICD_ONE_USER }}
        password: ${{ secrets.PENTAHO_CICD_ONE_KEY }}
      volumes:
        - /home/runner/caches/pentaho/.m2:/root/.m2
    steps:
      - name: Retrieve settings file
        id: common-maven
        uses: pentaho/actions-common@stable

      - name: Copy settings.xml to .m2 directory
        shell: sh
        run: |
          cp "${{ steps.common-maven.outputs.settings-file-path }}" /root/.m2

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PENTAHO_BUILDGUY }}

      - name: Get current version
        id: get-version
        run: |
          current_version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Current version: $current_version"
          echo "current_version=$current_version" >> $GITHUB_OUTPUT

      - name: Increment patch version
        id: increment-version
        shell: bash
        run: |
          current_version=${{ steps.get-version.outputs.current_version }}

          # Remove the -SNAPSHOT suffix if present
          base_version=${current_version%-SNAPSHOT}

          # Split into array
          IFS='.' read -r -a parts <<< "$base_version"
          last_index=$((${#parts[@]} - 1))
          parts[$last_index]=$((parts[$last_index] + 1))

          # Reconstruct version, joining the parts by dots
          new_version=$(IFS='.'; echo "${parts[*]}")

          # Reattach the -SNAPSHOT suffix if it was present
          if [[ "$current_version" == *-SNAPSHOT ]]; then
            new_version="$new_version-SNAPSHOT"
          fi

          echo "Base version: $base_version"
          echo "New version: $new_version"
          echo "base_version=$base_version" >> $GITHUB_OUTPUT
          echo "new_version=$new_version" >> $GITHUB_OUTPUT

      - name: Update Maven version
        run: mvn versions:set -DnewVersion=${{ steps.increment-version.outputs.new_version }} -DprocessAllModules=true -DgenerateBackupPoms=false

      - name: Configure Git
        run: |
          git config --global --add safe.directory /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}
          git config --global user.name "buildguy"
          git config --global user.email "hv.buildguy@hitachivantara.com"

      - name: Commit changes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.PENTAHO_BUILDGUY }}
        run: |
          find . -name "pom.xml.versionsBackup" -type f -delete
          # Add all files matching patterns (git add ignores non-existent files with pathspecs)
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update version to ${{ steps.increment-version.outputs.new_version }}"
            git push
          fi
